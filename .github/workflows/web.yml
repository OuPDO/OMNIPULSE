name: Web CI/CD

on:
  push:
    branches: [main, staging]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/oupdo/omnipulse-web

jobs:
  lint-and-build:
    name: Lint, Type-Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tokens
        run: pnpm tokens:build

      - name: Lint
        run: pnpm --filter @omnipulse/web lint

      - name: Type Check
        run: pnpm --filter @omnipulse/web type-check

      - name: Build
        run: pnpm --filter @omnipulse/web build

  docker:
    name: Build & Push Docker Image
    needs: lint-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: branch
        run: echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.name }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify Webhook
        if: success()
        run: |
          if [ "${{ steps.branch.outputs.name }}" = "main" ]; then
            curl -s -X POST "${{ secrets.COOLIFY_WEBHOOK_PROD }}" || true
          elif [ "${{ steps.branch.outputs.name }}" = "staging" ]; then
            curl -s -X POST "${{ secrets.COOLIFY_WEBHOOK_STAGING }}" || true
          fi
