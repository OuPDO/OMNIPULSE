# OMNIPULSE — Lokale Entwicklungsumgebung
# Usage: docker compose up -d
# Docs: docs/deployment.md

services:
  # === PostgreSQL (Zentral) ===
  postgres:
    image: postgres:17-alpine
    container_name: pg-om-zentral
    restart: unless-stopped
    environment:
      POSTGRES_DB: om_platform
      POSTGRES_USER: ${DB_USERNAME:-omnipulse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-omnipulse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: om-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Qdrant (Vektor-DB) ===
  qdrant:
    image: qdrant/qdrant:latest
    container_name: om-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      # DSGVO: Telemetrie deaktivieren
      QDRANT__TELEMETRY_DISABLED: "true"

volumes:
  pg_data:
  redis_data:
  qdrant_data:
